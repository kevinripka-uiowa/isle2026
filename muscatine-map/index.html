<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Muscatine Story Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
  <style>
    :root {
      --paper: #fffdf4;
      --ink: #263268;
      --muted: #5d5d5d;
      --border: #ded6c7;
      --accent: #9d3535;
      --accent-dark: #612020;
      --water: #8eb8cf;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; }

    html, body {
      overflow: hidden;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #f3f0e8;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 18px clamp(16px, 4vw, 44px);
      background: var(--paper);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0 0 4px;
      font-size: clamp(1.35rem, 2vw, 2rem);
      line-height: 1.1;
    }

    header p {
      margin: 0;
      font-size: 0.98rem;
    }

    .map-frame {
      position: relative;
      /* min-height: 680px; */
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: var(--paper);
    }

    #map { position: absolute; inset: 0; }

    .mapboxgl-ctrl-logo,
    .mapboxgl-ctrl-attrib { font-size: 11px; }

    .story-marker {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--paper);
      border: none;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      transition: box-shadow 160ms ease;
      padding: 2px;
    }

    .story-marker:hover,
    .story-marker:focus-visible {
      box-shadow: 0 11px 22px rgba(0, 0, 0, 0.26);
      outline: none;
    }

    .story-marker img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      margin: 0;
      transition: transform 160ms ease;
      pointer-events: none;
    }

    /* .story-marker:hover img,
    .story-marker:focus-visible img {
      transform: translateY(-3px);
    } */

    .mapboxgl-popup { max-width: 330px !important; }
    .mapboxgl-popup-content {
      padding: 0;
      border-radius: 0;
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mapboxgl-popup-close-button {
      width: 32px;
      height: 32px;
      color: white;
      font-size: 22px;
      line-height: 28px;
      z-index: 2;
    }

    .popup-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #ddd;
    }

    .popup-body { padding: 14px 16px 16px; }

    .popup-card h2 {
      margin: 0 26px 8px 0;
      font-size: 1.1rem;
      line-height: 1.15;
    }

    .popup-card p {
      margin: 0 0 13px;
      font-size: 0.95rem;
      line-height: 1.42;
    }

    .story-button {
      display: inline-block;
      padding: 9px 12px;
      background: var(--accent);
      color: var(--paper);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 999px;
      outline: none;
    }
    .sb-china {
      color: #8D0808;
    }
    .sb-melon {
      color: #596E1D;
    }
    .sb-buttons {
      color: #55719E;
    }
    .sb-boxing {
      color: #7B4C7A;
    }

    .story-button:hover { opacity: 0.9 }

    .story-annotation {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 12px;
      background: rgba(0, 0, 0, 0.18);
    }

    .story-annotation.hidden {
      display: none;
    }

    .annotation-dialog {
      position: relative;
      width: min(330px, calc(100vw - 24px));
      max-height: calc(100% - 24px);
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .story-annotation .popup-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #ddd;
    }

    .annotation-close {
      position: absolute;
      top: 0;
      right: 0;
      width: 32px;
      height: 32px;
      border: 0;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .annotation-close:hover,
    .annotation-close:focus-visible {
      background: rgba(0, 0, 0, 0.65);
      outline: none;
    }

    .inset-panel {
      position: absolute;
      right: 18px;
      bottom: 34px;
      width: min(260px, calc(100vw - 36px));
      background: rgba(255, 253, 244, 0.96);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 10px;
      z-index: 5;
    }

    .inset-panel h2 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      line-height: 1.1;
    }

    #inset-map {
      width: 100%;
      height: 155px;
      background: #eef3f5;
    }

    .inset-caption {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .reset-button {
      position: absolute;
      left: 18px;
      bottom: 34px;
      z-index: 5;
      border: 1px solid var(--border);
      background: rgba(255, 253, 244, 0.96);
      color: var(--ink);
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      font-weight: 700;
      cursor: pointer;
    }

    .reset-button:hover { background: white; }

    @media (max-width: 720px) {
      .map-frame { min-height: 720px; height: calc(100vh - 96px); }
      .inset-panel { right: 12px; bottom: 72px; width: 190px; }
      #inset-map { height: 118px; }
      .reset-button { left: 12px; bottom: 22px; }

      .annotation-dialog {
        width: calc(100vw - 24px);
        max-height: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- <header>
      <h1>Navigating the Narratives</h1>
      <p>Click on the icons to see where these stories take place in Muscatine.</p>
    </header> -->

    <main class="map-frame">
      <div id="map" aria-label="Map of Muscatine, Iowa with annotated story points"></div>

      <section id="story-annotation" class="story-annotation hidden" aria-live="polite">
        <div class="annotation-dialog" role="dialog" aria-modal="true" aria-labelledby="annotation-title">
          <button id="close-annotation" class="annotation-close" type="button" aria-label="Close annotation">×</button>
          <div id="annotation-content"></div>
        </div>
      </section>

      <!-- <button class="reset-button" id="reset-map" type="button">Reset map</button> -->
      <aside class="inset-panel" aria-label="Inset locator map showing Muscatine in Iowa">
        <h2>Location in Iowa</h2>
        <div id="inset-map"></div>
        <p class="inset-caption">The red box marks the area shown in the main map.</p>
      </aside>
    </main>
  </div>

  <script>

-91.05321121600787,41.4533802406878],[-91.0491943359375,41.45334164295883],[-91.0491943359375,41.453328333242695],[-91.04026794433594,41.453212983475225],[-91.04009628295898,41.46446972255933],[-91.03597640991211,41.464405403886445],[-91.03520393371582,41.46273309599809],[-91.03314399719238,41.46273309599809],[-91.03142738342285,41.460739134072526],[-91.03434562683105,41.46652788640523],[-91.0338306427002,41.46852167033026],[-91.02644920349121,41.468457355676804],[-91.02327346801758,41.47186594439361],[-91.02129936218262,41.475210045937814],[-91.02002090874848,41.478786],[-91.01760759747448,41.478786],[-91.00773811340332,41.47868258416966],[-91.0078239440918,41.47623896555069],[-91.00310325622559,41.47591742992623],[-91.00301742553711,41.47868258416966],[-90.99803924560547,41.47861827959687],[-90.997108,41.47665202658657],[-90.997108,41.476608607923225],[-91.0026741027832,41.46961500967791],[-91.00808143615723,41.46961500967791],[-91.00808143615723,41.47141576370299],[-91.01305961608887,41.47141576370299],[-91.01323127746582,41.46112506697207],[-91.0081672668457,41.46382653295959],[-91.00833892822266,41.45675102629116],[-91.01503372192383,41.45687967875713],[-91.01503372192383,41.453212983475225],[-91.01374626159668,41.453212983475225],[-91.01451873779297,41.449610414329186],[-91.01469039916992,41.44523559711962],[-91.01117134094238,41.44523559711962],[-91.00996971130371,41.44182560856203],[-91.01649284362793,41.44028140385504],[-91.01692199707031,41.442469016345115],[-91.01906776428223,41.442469016345115],[-91.0173511505127,41.441117852632516],[-91.01803779602051,41.43963797438235],[-91.02087020874023,41.440474431452884],[-91.02129936218262,41.42432247032701],[-91.02593421936035,41.42400067728789],[-91.03271484375,41.42161935923528],[-91.04129791259766,41.41762884673497],[-91.05134010314941,41.413380612381644]]],[[[-91.01228713989258,41.44092482694845],[-91.01134300231934,41.4380937176206],[-91.01546287536621,41.436871154958425],[-91.01675033569336,41.439251913636696],[-91.01228713989258,41.44092482694845]]]]}}]};
    // -----------------------------------------------------------------------------
    // STORY POINTS
    // -----------------------------------------------------------------------------
    // Students should edit this section.
    //
    // For each point:
    // - title: The popup headline.
    // - shortTitle: A short label used only for your own organization.
    // - text: One short paragraph for the popup.
    // - image: Path to the image shown in the popup.
    // - alt: Alt text for the popup image.
    // - storyUrl: Link for the “Go to story” button.
    // - icon: Path to an SVG icon in your icons folder.
    // - coordinates: [longitude, latitude]
    // - popupAnchor: Optional. Use "left" to open the popup to the right of the marker,
    //   or "right" to open the popup to the left of the marker.
    //   Leave it out to choose automatically based on the marker location.
    //
    // Example folder structure:
    // index.html
    // images/button-factory.jpg
    // icons/factory.svg

    const STORY_POINTS = [
      {
        id: "button-factory",
        title: "National Pearl Button Museum",
        shortTitle: "National Pearl Button Museum",
        text: "Muscatine was known as the Pearl Button Capital of the World for its massive production of mussel-shell buttons. Today, the descendants of the Barry family and workers at the Pearl Button Museum strive to preserve and share this history with the community.",
        image: "images/earrings.jpg",
        alt: "Historic button factory site in Muscatine",
        storyUrl: "https://isle2026.tilda.ws/pride-of-pearl-city",
        color: "#55719E",
        icon: "icons/button.svg",
        coordinates: [-91.04632948797993,41.4212417204541]
      },
      {
        id: "boxing",
        title: "Muscatine Boxing Club",
        shortTitle: "Muscatine Boxing Club",
        text: "Since 1971, the Williams family has welcomed the Muscatine population into their family-run gym. Today, the gym remains a gathering space for the Williams and the community to build strength and community.",
        image: "images/boxing.JPG",
        alt: "Mississippi Riverfront in Muscatine",
        storyUrl: "https://isle2026.tilda.ws/behind-every-corner",
        color: "#7B4C7A",
        icon: "icons/boxing.svg",
        coordinates: [-91.06359598798065,41.40755199059954]
      },
      {
        id: "china",
        title: "Sino-US Friendship House",
        shortTitle: "Downtown",
        text: "China's now-President Xi Jinping was hosted at this house in 1985. Today, the Friendship House is a symbol of this longstanding diplomatic connection, which continues to make global citizens out of Muscatine residents.",
        image: "images/china.png",
        alt: "Downtown Muscatine streetscape",
        storyUrl: "https://isle2026.tilda.ws/belonging-beyond-borders",
        color: "#8D0808",        
        icon: "icons/globe.svg",
        coordinates: [-91.0761678168149,41.4438839887452]
      },
      {
        id: "melons",
        title: "Muscatine Island",
        shortTitle: "Muscatine Island",
        text: "Muscatine’s Island is a segment of the Mississippi floodplain with ideal soil for agriculture. The Mairets and the Taylors operate the last two produce farms on the island responsible for maintaining Muscatine’s legacy as the home of the World's Finest Melons.",
        image: "images/melon.jpg",
        alt: "Fourth story location in Muscatine",
        storyUrl: "https://isle2026.tilda.ws/producing-the-future",
        color: "#596E1D",
        icon: "icons/melon.svg",
        coordinates: [-91.12733316099936,41.37386820336031]
      }
    ];
    const MUSCATINE_BOUNDS = [[-91.161347, 41.358525], [-90.997108, 41.478786]];
    const MUSCATINE_CENTER = [-91.0792275, 41.4186555];

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/standard",
      center: MUSCATINE_CENTER,
      zoom: 11.2,
      projection: "mercator",
      interactive: false
    });

    // The map is intentionally static for iframe display.
    // It cannot be panned, zoomed, rotated, or tilted by the viewer.
    map.dragPan.disable();
    map.scrollZoom.disable();
    map.boxZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    map.keyboard.disable();

    map.on("load", () => {
      addMuscatineBoundary(map);
      addStoryMarkers();
      fitMapToMuscatine(0);
    });

    // document.querySelector("#reset-map").addEventListener("click", () => {
    //   map.fitBounds(MUSCATINE_BOUNDS, { padding: 72, duration: 700 });
    // });

    function addMuscatineBoundary(targetMap) {
      if (targetMap.getSource("muscatine-boundary")) return;

      targetMap.addSource("muscatine-boundary", {
        type: "geojson",
        data: MUSCATINE_GEOJSON
      });

      targetMap.addLayer({
        id: "muscatine-fill",
        type: "fill",
        source: "muscatine-boundary",
        paint: {
          "fill-color": "#5da262",
          "fill-opacity": 0.3
        }
      });

      targetMap.addLayer({
        id: "muscatine-outline",
        type: "line",
        source: "muscatine-boundary",
        paint: {
          "line-color": "#6f6352",
          "line-width": 2.2
        }
      });
    }

    function fitMapToMuscatine(duration = 700) {
      map.fitBounds(MUSCATINE_BOUNDS, {
        padding: 72,
        duration
      });
    }

    let resizeTimer;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        fitMapToMuscatine(0);
      }, 150);
    });

    let activeAnnotationPoint = null;

    const storyAnnotation = document.querySelector("#story-annotation");
    const annotationContent = document.querySelector("#annotation-content");
    const closeAnnotationButton = document.querySelector("#close-annotation");

    closeAnnotationButton.addEventListener("click", () => {
      closeAnnotation();
    });

    storyAnnotation.addEventListener("click", (event) => {
      if (event.target === storyAnnotation) {
        closeAnnotation();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeAnnotation();
      }
    });

    function addStoryMarkers() {
      STORY_POINTS.forEach((point) => {
        const markerElement = document.createElement("button");
        markerElement.className = "story-marker";
        markerElement.type = "button";
        markerElement.setAttribute("aria-label", point.title);
        markerElement.innerHTML = `
          <img src="${escapeAttribute(point.icon)}" alt="" aria-hidden="true">
        `;

        markerElement.addEventListener("click", () => {
          openAnnotation(point);
        });

        new mapboxgl.Marker({ element: markerElement, anchor: "bottom" })
          .setLngLat(point.coordinates)
          .addTo(map);
      });
    }

    function openAnnotation(point) {
      activeAnnotationPoint = point;

      annotationContent.innerHTML = `
        <article class="popup-card">
          <img src="${escapeAttribute(point.image)}" alt="${escapeHTML(point.alt || point.title)}">
          <div class="popup-body">
            <h2 id="annotation-title">${escapeHTML(point.title)}</h2>
            <p>${escapeHTML(point.text)}</p>
            <a class="story-button" style="background-color:${escapeAttribute(point.color)}" href="${escapeAttribute(point.storyUrl)}">Go to story</a>
          </div>
        </article>
      `;

      storyAnnotation.classList.remove("hidden");

      closeAnnotationButton.focus({ preventScroll: true });
    }

    function closeAnnotation() {
      activeAnnotationPoint = null;
      storyAnnotation.classList.add("hidden");
    }

    function clamp(value, min, max) {
      if (max < min) return min;
      return Math.min(Math.max(value, min), max);
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHTML(value).replaceAll("`", "&#096;");
    }

    const insetMap = new mapboxgl.Map({
      container: "inset-map",
      style: "mapbox://styles/mapbox/light-v11",
      center: [-93.55, 42.05],
      zoom: 4,
      interactive: false,
      attributionControl: false,
      projection: "mercator"
    });

    insetMap.on("load", () => {
      insetMap.addSource("muscatine-focus-box", {
        type: "geojson",
        data: bboxToPolygon(MUSCATINE_BOUNDS)
      });

      insetMap.addLayer({
        id: "focus-box-fill",
        type: "fill",
        source: "muscatine-focus-box",
        paint: {
          "fill-color": "#9d3535",
          "fill-opacity": 0.28
        }
      });

      insetMap.addLayer({
        id: "focus-box-outline",
        type: "line",
        source: "muscatine-focus-box",
        paint: {
          "line-color": "#9d3535",
          "line-width": 2
        }
      });

      insetMap.addSource("muscatine-center", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            properties: { name: "Muscatine" },
            geometry: { type: "Point", coordinates: MUSCATINE_CENTER }
          }]
        }
      });

      insetMap.addLayer({
        id: "muscatine-dot",
        type: "circle",
        source: "muscatine-center",
        paint: {
          "circle-radius": 4,
          "circle-color": "#9d3535",
          "circle-stroke-color": "#fffdf4",
          "circle-stroke-width": 1.5
        }
      });

      insetMap.addLayer({
        id: "muscatine-label",
        type: "symbol",
        source: "muscatine-center",
        layout: {
          "text-field": "Muscatine",
          "text-size": 11,
          "text-offset": [-1.4, 0],
          "text-anchor": "right"
        },
        paint: {
          "text-color": "#202020",
          "text-halo-color": "#fffdf4",
          "text-halo-width": 1.2
        }
      });
    });

    function bboxToPolygon(bounds) {
      const [[west, south], [east, north]] = bounds;
      return {
        type: "FeatureCollection",
        features: [{
          type: "Feature",
          properties: {},
          geometry: {
            type: "Polygon",
            coordinates: [[
              [west, south],
              [east, south],
              [east, north],
              [west, north],
              [west, south]
            ]]
          }
        }]
      };
