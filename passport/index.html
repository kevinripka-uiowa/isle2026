<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="passport-interactive" data-passport>
  <div class="passport-stage">
    <div class="passport-book" data-book>
      <!-- Front cover -->
      <button class="passport-cover" data-open-passport aria-label="Open passport">
        <div class="passport-cover-inner">
          <div class="passport-emblem">✦</div>
          <div class="passport-title">PASSPORT</div>
          <!-- <div class="passport-subtitle">Diplomacy Project</div> -->
        </div>
      </button>

      <!-- Open spread -->
      <div class="passport-spread" aria-live="polite">
        <div class="passport-page passport-page-left">
          <div class="page-label">Place Visited</div>

          <div class="place-photo-wrap">
            <img
              data-place-image
              src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80"
              alt="Placeholder landscape"
              class="place-photo"
            >

            <!-- SVG stamp: nested here so it always overlaps the photo -->
            <div class="stamp-image-wrap">
              <img
                data-stamp-image
                src="https://upload.wikimedia.org/wikipedia/commons/3/36/Red_star.svg"
                alt="Passport stamp"
                class="stamp-image"
              >
            </div>
          </div>
        </div>

        <div class="passport-page passport-page-right">
          <div class="page-label">Trip Record</div>

          <h2 data-trip-title>Listening Visit to Iowa City</h2>

          <dl class="trip-meta">
            <div>
              <dt>Length of Stay</dt>
              <dd data-trip-length>10 days</dd>
            </div>
            <div>
              <dt>Program</dt>
              <dd data-trip-program>Study abroad seminar</dd>
            </div>
            <div>
              <dt>Purpose</dt>
              <dd data-trip-purpose>Community dialogue</dd>
            </div>
            <div>
              <dt>Role</dt>
              <dd data-trip-role>Faculty leader</dd>
            </div>
          </dl>

          <section class="trip-memory" aria-labelledby="trip-memory-label">
            <h3 id="trip-memory-label">Memory</h3>
            <p data-trip-memory>
              The character’s favorite memory was watching students connect a formal lesson to a spontaneous conversation in the city.
            </p>
          </section>

          <div class="passport-controls">
            <button type="button" data-prev-trip>Previous</button>
            <span data-page-count>1 / 3</span>
            <button type="button" data-next-trip>Next</button>
          </div>
        </div>

        <!-- Animated page overlay -->
        <div class="turning-page" data-turning-page>
          <div class="turning-page-front"></div>
          <div class="turning-page-back"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  .passport-interactive {
    width: 100%;
    padding: 40px 16px;
    /* font-family: "kopious", Georgia, 'Times New Roman', Times, serif; */
    color: #1d1a16;
  }

  .passport-stage {
    max-width: 980px;
    margin: 0 auto;
    perspective: 1800px;
  }

  .passport-book {
    position: relative;
    min-height: 620px;
    transform-style: preserve-3d;
  }

  .passport-cover {
    position: absolute;
    inset: 0;
    z-index: 5;
    width: min(420px, 90vw);
    height: 580px;
    margin: 0 auto;
    left: 0;
    right: 0;
    border: 0;
    border-radius: 18px;
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.13), transparent 22%),
      radial-gradient(circle at 72% 78%, rgba(0,0,0,0.18), transparent 28%),
      linear-gradient(135deg, #b20f0f 0%, #8D0808 48%, #5d0505 100%);
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.28);
    cursor: pointer;
    color: #f4d57a;
    transform-origin: left center;
    transition:
      transform 0.9s cubic-bezier(.2,.75,.2,1),
      opacity 0.35s ease 0.55s,
      visibility 0.35s ease 0.55s;
  }

  .passport-cover::before {
    content: "";
    position: absolute;
    inset: 22px;
    border: 2px solid rgba(244, 213, 122, 0.65);
    border-radius: 12px;
    pointer-events: none;
  }

  .passport-cover-inner {
    height: 100%;
    display: grid;
    place-content: center;
    text-align: center;
    gap: 22px;
  }

  .passport-emblem {
    font-size: 4rem;
    line-height: 1;
  }

  .passport-title {
    font-size: clamp(2.6rem, 3.5vw, 3.5rem);
    line-height: 1;
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  .passport-subtitle {
    font-size: 1rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .passport-book.is-open .passport-cover {
    transform: rotateY(-115deg);
    opacity: 0;
    visibility: hidden;
  }

  .passport-spread {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 580px;
    opacity: 0;
    transform: rotateX(4deg) scale(0.96);
    transform-origin: center;
    transition:
      opacity 0.35s ease 0.45s,
      transform 0.55s ease 0.45s;
    pointer-events: none;
  }

  .passport-book.is-open .passport-spread {
    opacity: 1;
    transform: rotateX(0deg) scale(1);
    pointer-events: auto;
  }

  .passport-page {
    position: relative;
    padding: clamp(24px, 4vw, 44px);
    background:
      linear-gradient(90deg, rgba(0,0,0,0.05), transparent 8%, transparent 92%, rgba(0,0,0,0.04)),
      repeating-linear-gradient(
        0deg,
        rgba(60, 45, 24, 0.035),
        rgba(60, 45, 24, 0.035) 1px,
        transparent 1px,
        transparent 8px
      ),
      #fff7df;
    border: 1px solid rgba(70, 50, 20, 0.18);
    box-shadow: 0 24px 70px rgba(0,0,0,0.18);
    overflow: hidden;
  }

  .passport-page-left {
    border-radius: 18px 0 0 18px;
  }

  .passport-page-right {
    border-radius: 0 18px 18px 0;
  }

  .passport-page-left::after,
  .passport-page-right::before {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 34px;
    pointer-events: none;
  }

  .passport-page-left::after {
    right: 0;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.12));
  }

  .passport-page-right::before {
    left: 0;
    background: linear-gradient(90deg, rgba(0,0,0,0.13), transparent);
  }

  .page-label {
    margin-bottom: 18px;
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(75, 55, 28, 0.68);
  }

  .place-photo-wrap {
    position: relative;
    aspect-ratio: 4 / 3;
    border: 8px solid #fffaf0;
    box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    transform: rotate(-1.5deg);
    background: #e5d7b6;
    overflow: visible;
  }

  .place-photo {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
    filter: saturate(0.9) contrast(0.95);
  }

  .stamp-image-wrap {
    position: absolute;
    left: -36px;
    bottom: -118px;
    width: 170px;
    height: 170px;
    transform: rotate(-12deg);
    mix-blend-mode: multiply;
    opacity: 0.85;
    pointer-events: none;
    z-index: 3;
  }

  .stamp-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .passport-page h2 {
    margin: 0 0 20px;
    font-size: clamp(2rem, 3vw, 3.4rem);
    line-height: 0.96;
    letter-spacing: -0.035em;
  }

  .trip-meta {
    display: grid;
    gap: 12px;
    margin: 0 0 22px;
    padding: 0;
  }

  .trip-meta div {
    display: grid;
    grid-template-columns: 130px 1fr;
    gap: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(70, 50, 20, 0.18);
  }

  .trip-meta dt {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(75, 55, 28, 0.66);
  }

  .trip-meta dd {
    margin: 0;
    font-size: 1rem;
    line-height: 1.4;
  }


  .trip-memory {
    max-height: clamp(120px, 18vw, 190px);
    overflow-y: auto;
    padding: 14px 16px 16px;
    margin: 0 0 84px;
    border: 1px solid rgba(70, 50, 20, 0.18);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.28);
  }

  .trip-memory h3 {
    margin: 0 0 8px;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(75, 55, 28, 0.66);
  }

  .trip-memory p {
    margin: 0;
  }

  .passport-page p {
    max-width: 34rem;
    margin: 0;
    font-size: clamp(1rem, 1.5vw, 1.1rem);
    line-height: 1.65;
  }

  .passport-controls {
    position: absolute;
    left: clamp(24px, 4vw, 44px);
    right: clamp(24px, 4vw, 44px);
    bottom: clamp(20px, 3vw, 32px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
  }

  .passport-controls button {
    border: 1px solid rgba(35, 28, 18, 0.28);
    border-radius: 999px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.4);
    color: inherit;
    font: inherit;
    font-size: 0.9rem;
    cursor: pointer;
  }

  .passport-controls button:hover,
  .passport-controls button:focus-visible {
    background: rgba(35, 28, 18, 0.08);
  }

  .passport-controls span {
    font-size: 0.85rem;
    color: rgba(35, 28, 18, 0.62);
  }

  .turning-page {
    position: absolute;
    top: 0;
    bottom: 0;
    right: 0;
    width: 50%;
    z-index: 4;
    transform-style: preserve-3d;
    transform-origin: left center;
    pointer-events: none;
    opacity: 0;
  }

  .turning-page-front,
  .turning-page-back {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.1), transparent 16%),
      #fff4d5;
    border: 1px solid rgba(70, 50, 20, 0.18);
  }

  .turning-page-back {
    transform: rotateY(180deg);
    background:
      linear-gradient(90deg, transparent, rgba(0,0,0,0.12)),
      #fff7df;
  }

  .passport-book.is-turning .turning-page {
    opacity: 1;
    animation: turnPassportPage 0.65s cubic-bezier(.2,.75,.2,1);
  }

  @keyframes turnPassportPage {
    0% {
      transform: rotateY(0deg);
    }
    100% {
      transform: rotateY(-180deg);
    }
  }

  @keyframes turnPassportPageUp {
    0% {
      transform: rotateX(0deg);
    }
    100% {
      transform: rotateX(180deg);
    }
  }

  @media (max-width: 760px) {
    .passport-book {
      min-height: auto;
    }

    .passport-cover {
      position: relative;
      height: 520px;
    }

    .passport-book.is-open .passport-cover {
      display: none;
    }

    .passport-spread {
      grid-template-columns: 1fr;
      min-height: auto;
      --mobile-seam-y: 50%;
      --mobile-page-height: 520px;
    }

    .passport-page-left {
      border-radius: 18px 18px 0 0;
      border-bottom-width: 0;
    }

    .passport-page-right {
      min-height: 520px;
      border-radius: 0 0 18px 18px;
    }

    .passport-page-left::after,
    .passport-page-right::before {
      left: 0;
      right: 0;
      width: auto;
      height: 34px;
      pointer-events: none;
    }

    .passport-page-left::after {
      top: auto;
      bottom: 0;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.12));
    }

    .passport-page-right::before {
      top: 0;
      bottom: auto;
      background: linear-gradient(180deg, rgba(0,0,0,0.13), transparent);
    }

    .turning-page {
      display: block;
      top: var(--mobile-seam-y);
      bottom: auto;
      left: 0;
      right: 0;
      width: 100%;
      height: var(--mobile-page-height);
      transform-origin: center top;
    }

    .turning-page-front,
    .turning-page-back {
      background:
        linear-gradient(180deg, rgba(0,0,0,0.1), transparent 16%),
        #fff4d5;
    }

    .turning-page-back {
      transform: rotateX(180deg);
      background:
        linear-gradient(180deg, transparent, rgba(0,0,0,0.12)),
        #fff7df;
    }

    .passport-book.is-turning .turning-page {
      animation: turnPassportPageUp 0.65s cubic-bezier(.2,.75,.2,1);
    }

    .stamp-image-wrap {
      position: absolute;
      left: -20px;
      bottom: -34px;
      width: 130px;
      height: 130px;
      margin: 0;
    }

    .passport-controls {
      position: static;
      margin-top: 32px;
    }

    .trip-memory {
      max-height: 220px;
      margin-bottom: 32px;
    }

    .trip-meta div {
      grid-template-columns: 1fr;
      gap: 4px;
    }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const passport = document.querySelector("[data-passport]");
    if (!passport) return;

    const book = passport.querySelector("[data-book]");
    const openButton = passport.querySelector("[data-open-passport]");
    const prevButton = passport.querySelector("[data-prev-trip]");
    const nextButton = passport.querySelector("[data-next-trip]");

    const image = passport.querySelector("[data-place-image]");
    const stampImage = passport.querySelector("[data-stamp-image]");
    const title = passport.querySelector("[data-trip-title]");
    const length = passport.querySelector("[data-trip-length]");
    const program = passport.querySelector("[data-trip-program]");
    const purpose = passport.querySelector("[data-trip-purpose]");
    const role = passport.querySelector("[data-trip-role]");
    const memory = passport.querySelector("[data-trip-memory]");
    const pageCount = passport.querySelector("[data-page-count]");
    const spread = passport.querySelector(".passport-spread");
    const leftPage = passport.querySelector(".passport-page-left");
    const rightPage = passport.querySelector(".passport-page-right");

    function updateMobileTurnOverlay() {
      if (!spread || !leftPage || !rightPage) return;

      if (window.matchMedia("(max-width: 760px)").matches) {
        spread.style.setProperty("--mobile-seam-y", leftPage.offsetHeight + "px");
        spread.style.setProperty("--mobile-page-height", rightPage.offsetHeight + "px");
      } else {
        spread.style.removeProperty("--mobile-seam-y");
        spread.style.removeProperty("--mobile-page-height");
      }
    }

    const trips = [
      {
        title: "Summer 2024",
        length: "10 days",
        program: "Study abroad seminar",
        purpose: "Cultural exchange and classroom field learning",
        role: "Faculty leader",
        stampSvg: "images/beijing.svg",
        image: "https://upload.wikimedia.org/wikipedia/commons/3/3f/Peking_F%C3%BCnf_Drachen_Pavillons-20131229-RM-120744.jpg",
        alt: "Landscape view",
        memory: "My favorite memory was watching students realize that the most important lesson of the trip came from an ordinary conversation, not from a scheduled site visit."
      },
      {
        title: "Market Square Meeting",
        length: "4 days",
        program: "Community diplomacy visit",
        purpose: "Meet residents and observe everyday civic exchange",
        role: "Observer and discussion facilitator",
        stampSvg: "images/beijing.svg",
        image: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?auto=format&fit=crop&w=900&q=80",
        alt: "City street scene",
        memory: "My favorite memory was hearing the market grow louder through the morning as food, language, trade, and routine created a kind of diplomacy that felt informal but deeply important."
      },
      {
        title: "University Forum",
        length: "2 days",
        program: "Public scholarship forum",
        purpose: "Share findings and invite questions from students and faculty",
        role: "Presenter",
        stampSvg: "images/beijing.svg",
        image: "https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=900&q=80",
        alt: "University building",
        memory: "My favorite memory was the moment a student asked a difficult question that changed the direction of the whole conversation and made the forum feel less like a presentation and more like a shared inquiry."
      }
    ];

    let currentIndex = 0;
    let isAnimating = false;

    function renderTrip(index) {
      const trip = trips[index];

      image.src = trip.image;
      image.alt = trip.alt;
      stampImage.src = trip.stampSvg;
      title.textContent = trip.title;
      length.textContent = trip.length;
      program.textContent = trip.program;
      purpose.textContent = trip.purpose;
      role.textContent = trip.role;
      memory.textContent = trip.memory;
      pageCount.textContent = `${index + 1} / ${trips.length}`;

      // Hide edge navigation instead of wrapping back around.
      prevButton.hidden = index === 0;
      nextButton.hidden = index === trips.length - 1;

      updateMobileTurnOverlay();
      image.addEventListener("load", updateMobileTurnOverlay, { once: true });
    }

    function turnTo(index) {
      if (isAnimating || index === currentIndex) return;

      isAnimating = true;
      book.classList.add("is-turning");

      window.setTimeout(function () {
        currentIndex = index;
        renderTrip(currentIndex);
      }, 280);

      window.setTimeout(function () {
        book.classList.remove("is-turning");
        isAnimating = false;
      }, 700);
    }

    openButton.addEventListener("click", function () {
      book.classList.add("is-open");
      window.setTimeout(updateMobileTurnOverlay, 0);
    });

    window.addEventListener("resize", updateMobileTurnOverlay);

    nextButton.addEventListener("click", function () {
      if (currentIndex < trips.length - 1) {
        turnTo(currentIndex + 1);
      }
    });

    prevButton.addEventListener("click", function () {
      if (currentIndex > 0) {
        turnTo(currentIndex - 1);
      }
    });

    renderTrip(currentIndex);
  });
</script>
</body>
</html>
