<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Muscatine Story Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.15.0/mapbox-gl.js"></script>
  <style>
    :root {
      --paper: #fffdf4;
      --ink: #202020;
      --muted: #5d5d5d;
      --border: #ded6c7;
      --accent: #9d3535;
      --accent-dark: #612020;
      --water: #8eb8cf;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.16);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: #f3f0e8;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      padding: 18px clamp(16px, 4vw, 44px);
      background: var(--paper);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      margin: 0 0 4px;
      font-size: clamp(1.35rem, 2vw, 2rem);
      line-height: 1.1;
    }

    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .map-frame {
      position: relative;
      /* min-height: 680px; */
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: var(--paper);
    }

    #map { position: absolute; inset: 0; }

    .mapboxgl-ctrl-logo,
    .mapboxgl-ctrl-attrib { font-size: 11px; }

    .story-marker {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: var(--paper);
      border: none;
      box-shadow: 0 7px 18px rgba(0, 0, 0, 0.22);
      cursor: pointer;
      transition: box-shadow 160ms ease;
      padding: 2px;
    }

    .story-marker:hover,
    .story-marker:focus-visible {
      box-shadow: 0 11px 22px rgba(0, 0, 0, 0.26);
      outline: none;
    }

    .story-marker img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      margin: 0;
      transition: transform 160ms ease;
    }
/* 
    .story-marker:hover img,
    .story-marker:focus-visible img {
      transform: translateY(-3px);
    } */

    .mapboxgl-popup { max-width: 330px !important; }
    .mapboxgl-popup-content {
      padding: 0;
      border-radius: 0;
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .mapboxgl-popup-close-button {
      width: 32px;
      height: 32px;
      color: white;
      font-size: 22px;
      line-height: 28px;
      z-index: 2;
    }

    .popup-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #ddd;
    }

    .popup-body { padding: 14px 16px 16px; }

    .popup-card h2 {
      margin: 0 26px 8px 0;
      font-size: 1.1rem;
      line-height: 1.15;
    }

    .popup-card p {
      margin: 0 0 13px;
      color: #333;
      font-size: 0.95rem;
      line-height: 1.42;
    }

    .story-button {
      display: inline-block;
      padding: 9px 12px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 999px;
    }

    .story-button:hover { background: var(--accent-dark); }


    .story-annotation {
      position: absolute;
      z-index: 20;
      width: min(330px, calc(100vw - 24px));
      max-height: calc(100% - 24px);
      background: var(--paper);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      overflow: auto;
    }

    .story-annotation.hidden {
      display: none;
    }

    .story-annotation .popup-card img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      background: #ddd;
    }

    .annotation-close {
      position: absolute;
      top: 0;
      right: 0;
      width: 32px;
      height: 32px;
      border: 0;
      background: rgba(0, 0, 0, 0.45);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      z-index: 2;
    }

    .annotation-close:hover,
    .annotation-close:focus-visible {
      background: rgba(0, 0, 0, 0.65);
      outline: none;
    }

    .inset-panel {
      position: absolute;
      right: 18px;
      bottom: 34px;
      width: min(260px, calc(100vw - 36px));
      background: rgba(255, 253, 244, 0.96);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 10px;
      z-index: 5;
    }

    .inset-panel h2 {
      margin: 0 0 8px;
      font-size: 0.92rem;
      line-height: 1.1;
    }

    #inset-map {
      width: 100%;
      height: 155px;
      background: #eef3f5;
    }

    .inset-caption {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .reset-button {
      position: absolute;
      left: 18px;
      bottom: 34px;
      z-index: 5;
      border: 1px solid var(--border);
      background: rgba(255, 253, 244, 0.96);
      color: var(--ink);
      padding: 10px 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      font-weight: 700;
      cursor: pointer;
    }

    .reset-button:hover { background: white; }

    @media (max-width: 720px) {
      .map-frame { min-height: 720px; height: calc(100vh - 96px); }
      .inset-panel { right: 12px; bottom: 72px; width: 190px; }
      #inset-map { height: 118px; }
      .reset-button { left: 12px; bottom: 22px; }

      .story-annotation {
        width: calc(100vw - 24px);
        max-height: calc(100% - 24px);
      }
    }
  </style>
</head>
<body>
  <div class="page">

    <main class="map-frame">
      <div id="map" aria-label="Map of Muscatine, Iowa with annotated story points"></div>

      <section id="story-annotation" class="story-annotation hidden" aria-live="polite">
        <button id="close-annotation" class="annotation-close" type="button" aria-label="Close annotation">×</button>
        <div id="annotation-content"></div>
      </section>

      <!-- <button class="reset-button" id="reset-map" type="button">Reset map</button> -->
      <aside class="inset-panel" aria-label="Inset locator map showing Muscatine in Iowa">
        <h2>Location in Iowa</h2>
        <div id="inset-map"></div>
        <p class="inset-caption">The red box marks the area shown in the main map.</p>
      </aside>
    </main>
  </div>

    const MUSCATINE_BOUNDS = [[-91.1693083, 41.2524418], [-91.0536079, 41.412904]];

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
      container: "map",
      style: "mapbox://styles/mapbox/standard",
      center: MUSCATINE_CENTER,
      zoom: 11.2,
      projection: "mercator",

    // The map is intentionally static for iframe display.
    // It cannot be panned, zoomed, rotated, or tilted by the viewer.
    map.dragPan.disable();
    map.scrollZoom.disable();
    map.boxZoom.disable();
    map.doubleClickZoom.disable();
    map.touchZoomRotate.disable();
    map.keyboard.disable();

    map.on("load", () => {
      addMuscatineBoundary(map);
      addStoryMarkers();
      fitMapToMuscatine(0);
    });

    // document.querySelector("#reset-map").addEventListener("click", () => {

    // });

    function addMuscatineBoundary(targetMap) {
      if (targetMap.getSource("muscatine-boundary")) return;

      targetMap.addSource("muscatine-boundary", {
        type: "geojson",
        data: MUSCATINE_GEOJSON
      });

      targetMap.addLayer({
        id: "muscatine-fill",
        type: "fill",
        source: "muscatine-boundary",
        paint: {
          "fill-color": "#5da262",
          "fill-opacity": 0.3
        }
      });

      targetMap.addLayer({
        id: "muscatine-outline",
        type: "line",
        source: "muscatine-boundary",
        paint: {
          "line-color": "#6f6352",
          "line-width": 2.2
        }
      });
    }

    function fitMapToMuscatine(duration = 700) {
      map.fitBounds(MUSCATINE_BOUNDS, {
        padding: 72,
        duration
      });
    }

    let resizeTimer;

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        fitMapToMuscatine(0);
        requestAnimationFrame(positionAnnotation);
      }, 150);
    });

    let activeAnnotationPoint = null;

    const storyAnnotation = document.querySelector("#story-annotation");
    const annotationContent = document.querySelector("#annotation-content");
    const closeAnnotationButton = document.querySelector("#close-annotation");

    closeAnnotationButton.addEventListener("click", () => {
      closeAnnotation();
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        closeAnnotation();
      }
    });

    map.on("move", () => {
      positionAnnotation();
    });

    function addStoryMarkers() {
      STORY_POINTS.forEach((point) => {
        const markerElement = document.createElement("button");
        markerElement.className = "story-marker";
        markerElement.type = "button";
        markerElement.setAttribute("aria-label", point.title);
        markerElement.innerHTML = `
          <img src="${escapeAttribute(point.icon)}" alt="" aria-hidden="true">
        `;

        markerElement.addEventListener("click", () => {
          openAnnotation(point);
        });

        new mapboxgl.Marker({ element: markerElement, anchor: "bottom" })
          .setLngLat(point.coordinates)
          .addTo(map);
      });
    }

    function openAnnotation(point) {
      activeAnnotationPoint = point;

      const buttonStyle = point.color
        ? ` style="background-color:${escapeAttribute(point.color)}"`
        : "";

      annotationContent.innerHTML = `
        <article class="popup-card">
          <img src="${escapeAttribute(point.image)}" alt="${escapeHTML(point.alt || point.title)}">
          <div class="popup-body">
            <h2>${escapeHTML(point.title)}</h2>
            <p>${escapeHTML(point.text)}</p>
          </div>
        </article>
      `;

      storyAnnotation.classList.remove("hidden");

      const annotationImage = annotationContent.querySelector("img");
      annotationImage.addEventListener("load", positionAnnotation, { once: true });

      positionAnnotation();
      closeAnnotationButton.focus({ preventScroll: true });
    }

    function closeAnnotation() {
      activeAnnotationPoint = null;
      storyAnnotation.classList.add("hidden");
    }

    function positionAnnotation() {
      if (!activeAnnotationPoint || storyAnnotation.classList.contains("hidden")) return;

      const mapFrame = document.querySelector(".map-frame");
      const markerScreenPosition = map.project(activeAnnotationPoint.coordinates);

      const gap = 18;
      const edgePadding = 12;
      const panelWidth = storyAnnotation.offsetWidth;
      const panelHeight = storyAnnotation.offsetHeight;
      const frameWidth = mapFrame.clientWidth;
      const frameHeight = mapFrame.clientHeight;

      let preferredAnchor = activeAnnotationPoint.popupAnchor || getPopupAnchor(activeAnnotationPoint.coordinates);
      let left;

      // "left" means the popup's left edge attaches near the marker,
      // so the popup opens to the right of the marker.
      if (preferredAnchor === "left") {
        left = markerScreenPosition.x + gap;

        if (left + panelWidth > frameWidth - edgePadding) {
          left = markerScreenPosition.x - panelWidth - gap;
        }
      } else {
        left = markerScreenPosition.x - panelWidth - gap;

        if (left < edgePadding) {
          left = markerScreenPosition.x + gap;
        }
      }

      let top = markerScreenPosition.y - panelHeight / 2;

      // Keep the annotation fully inside the iframe or browser viewport.
      left = clamp(left, edgePadding, frameWidth - panelWidth - edgePadding);
      top = clamp(top, edgePadding, frameHeight - panelHeight - edgePadding);

      storyAnnotation.style.left = `${left}px`;
      storyAnnotation.style.top = `${top}px`;
    }

    function clamp(value, min, max) {
      if (max < min) return min;
      return Math.min(Math.max(value, min), max);
    }

    function getPopupAnchor(coordinates) {
      // Mapbox anchors describe the side of the popup attached to the marker.
      // "left" means the popup opens to the right of the marker.
      // "right" means the popup opens to the left of the marker.
      const markerLongitude = coordinates[0];
      const mapCenterLongitude = MUSCATINE_CENTER[0];

      return markerLongitude < mapCenterLongitude ? "left" : "right";
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHTML(value).replaceAll("`", "&#096;");
    }

    const insetMap = new mapboxgl.Map({
      container: "inset-map",
      style: "mapbox://styles/mapbox/light-v11",
      center: [-93.55, 42.05],
      zoom: 4,
      interactive: false,
      attributionControl: false,
      projection: "mercator"
    });

    insetMap.on("load", () => {
      insetMap.addSource("muscatine-focus-box", {
        type: "geojson",
        data: bboxToPolygon(MUSCATINE_BOUNDS)
      });

      insetMap.addLayer({
        id: "focus-box-fill",
        type: "fill",
        source: "muscatine-focus-box",
        paint: {
          "fill-color": "#9d3535",
          "fill-opacity": 0.28
        }
      });

      insetMap.addLayer({
        id: "focus-box-outline",
        type: "line",
        source: "muscatine-focus-box",
        paint: {
          "line-color": "#9d3535",
          "line-width": 2
        }
      });

      insetMap.addSource("muscatine-center", {
        type: "geojson",
        data: {
          type: "FeatureCollection",
          features: [{
            type: "Feature",
            properties: { name: "Muscatine" },
            geometry: { type: "Point", coordinates: MUSCATINE_CENTER }
          }]
        }
      });

      insetMap.addLayer({
        id: "muscatine-dot",
        type: "circle",
        source: "muscatine-center",
        paint: {
          "circle-radius": 4,
          "circle-color": "#9d3535",
          "circle-stroke-color": "#fffdf4",
          "circle-stroke-width": 1.5
        }
      });

      insetMap.addLayer({
        id: "muscatine-label",
        type: "symbol",
        source: "muscatine-center",
        layout: {
          "text-field": "Muscatine",
          "text-size": 11,
          "text-offset": [-1.4, 0],
          "text-anchor": "right"
        },
        paint: {
          "text-color": "#202020",
          "text-halo-color": "#fffdf4",
          "text-halo-width": 1.2
        }
      });
    });

    function bboxToPolygon(bounds) {
      const [[west, south], [east, north]] = bounds;
      return {
        type: "FeatureCollection",
        features: [{
          type: "Feature",
          properties: {},
          geometry: {
            type: "Polygon",
            coordinates: [[
              [west, south],
              [east, south],
              [east, north],
              [west, north],
              [west, south]
            ]]
          }
        }]
      };
    }
  </script>
</body>
</html>
