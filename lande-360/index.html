<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>360 Annotated Photo</title>

  <!-- Pannellum CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
  />

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000;
    }

    #panorama {
      width: 100vw;
      height: 100vh;
    }

    /* Custom hotspot button */
    .custom-hotspot {
      --hotspot-size: 36px;

      width: var(--hotspot-size);
      height: var(--hotspot-size);
      border-radius: 999px;
      border: 3px solid white;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.45);
      transition: background 0.18s ease;
      overflow: visible;
      padding:0;
      box-shadow: 0 0 6px rgba(0,0,0,0.5);
    }

    .custom-hotspot:hover,
    .custom-hotspot:focus {
      transform: scale(1.15);
      background: rgba(30, 30, 30, 0.92);
      outline: none;
    }

    .custom-hotspot img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* Hidden label that appears on hover/focus */
    /* .custom-hotspot::after {
      content: attr(data-label);
      position: absolute;
      left: 42px;
      top: 50%;
      transform: translateY(-50%);
      min-width: max-content;
      max-width: 260px;
      padding: 6px 9px;
      border-radius: 6px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 500;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    } */

    .custom-hotspot:hover::after,
    .custom-hotspot:focus::after {
      opacity: 1;
    }

    /* Modal overlay for rich annotations */
    .annotation-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
    }

    .annotation-overlay.is-open {
      display: flex;
    }

    .annotation-card {
      position: relative;
      width: min(760px, 100%);
      max-height: min(82vh, 820px);
      overflow: auto;
      border-radius: 16px;
      background: #fff;
      color: #161616;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.45);
    }

    .annotation-content {
      padding: 24px;
    }

    .annotation-content h2 {
      margin: 0 0 10px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      line-height: 1.1;
    }

    .annotation-content p {
      margin: 0 0 16px;
      font-size: 1rem;
      line-height: 1.55;
    }

    .annotation-media {
      margin-top: 16px;
    }

    .annotation-media img,
    .annotation-media video {
      display: block;
      width: 100%;
      max-height: 55vh;
      object-fit: contain;
      border-radius: 10px;
      background: #111;
    }

    .annotation-media audio {
      width: 100%;
    }

    .annotation-media iframe {
      width: 100%;
      aspect-ratio: 16 / 9;
      border: 0;
      border-radius: 10px;
      background: #111;
    }

    .slideshow {
      display: grid;
      gap: 14px;
    }

    .slideshow-image {
      display: block;
      width: 100%;
      max-height: 52vh;
      object-fit: contain;
      border-radius: 10px;
      background: #111;
    }

    .slideshow-caption {
      display: grid;
      gap: 6px;
    }

    .slideshow-caption h3 {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.2;
    }

    .slideshow-caption p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.5;
    }

    .slideshow-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 4px;
    }

    .slideshow-button {
      border: 0;
      border-radius: 999px;
      padding: 8px 14px;
      background: #161616;
      color: #fff;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    .slideshow-button:hover,
    .slideshow-button:focus {
      background: #000;
      outline: 2px solid #444;
      outline-offset: 2px;
    }

    .slideshow-counter {
      color: #555;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .annotation-close {
      position: sticky;
      top: 0;
      float: right;
      z-index: 2;
      margin: 12px 12px 0 0;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.78);
      color: white;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
    }

    .annotation-close:hover,
    .annotation-close:focus {
      background: #000;
      outline: 2px solid white;
    }

    .annotation-link {
      display: inline-block;
      margin-top: 4px;
      color: #0645ad;
      font-weight: 650;
    }

    @media (max-width: 600px) {
      .annotation-overlay {
        padding: 12px;
      }

      .annotation-content {
        padding: 18px;
      }

      .custom-hotspot::after {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main id="panorama" aria-label="360 photo viewer"></main>

  <div class="annotation-overlay" id="annotationOverlay" aria-hidden="true">
    <article class="annotation-card" role="dialog" aria-modal="true" aria-labelledby="annotationTitle">
      <button class="annotation-close" id="annotationClose" aria-label="Close annotation">
        &times;
      </button>

      <div class="annotation-content">
        <h2 id="annotationTitle"></h2>
        <p id="annotationText"></p>

        <div class="annotation-media" id="annotationMedia"></div>
        <a class="annotation-link" id="annotationLink" href="#" target="_blank" rel="noopener"></a>
      </div>
    </article>
  </div>

  <!-- Pannellum JS -->
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

  <script>
    /*
      STUDENTS EDIT THIS SECTION
      ------------------------------------------------------------
      1. Replace PANORAMA_IMAGE with your 360 photo file.
      2. Edit HOTSPOTS to add annotations.
      3. Set iconSrc to use a custom PNG or SVG hotspot icon.
      4. Set mediaType to image, video, audio, embed, or slideshow.
      5. Use pitch and yaw to position hotspots.
         - Open the page.
         - Move the view where you want the hotspot.
         - Click the mouse and check the browser console for pitch/yaw.
    */

    const PANORAMA_IMAGE = "images/GS__0088.JPG";

    const START_VIEW = {
      yaw: 91.61,
      pitch: -19.30,
      hfov: 90
    };

    const HOTSPOTS = [
      {
        id: "Fireplace",
        label: "Sarah and President Xi Jinping",
        pitch: 14.67,
        yaw: 4.63,
        iconSrc: "images/hotspot-default.svg",
        iconAlt: "",
        iconSize: 32,
        fallbackIcon: "+",
        title: "A commemoration of friendship",
        text: "Perched atop the mantel in Sarah Lande's living room is a photograph of Xi Jinping speaking to his longtime Iowa friends during his return to Muscatine in 2012. Xi first visited the community in 1985 as a member of a Chinese agricultural delegation from Hebei Province, where he studied American farming practices and rural development. Nearly three decades later, he returned to reunite with the families he had met during that visit, shortly before assuming China's presidency. Photograph by POOL/Getty Images.",
        mediaType: "image",
        mediaSrc: "images/photo2.jpg",
        mediaAlt: "Sarah Lande Home",
        // linkText: "Read more",
        linkUrl: "https://example.com"
      },
      {
        id: "Piano",
        label: "piano",
        pitch: -0.03,
        yaw: -81.45,
        iconSrc: "images/hotspot-default.svg",
        iconAlt: "",
        iconSize: 32,
        fallbackIcon: "+",
        title: "From Muscatine to Beijing: The Legacy of a 1985 Visit",
        text: "Photographs and gifts displayed throughout Sarah Lande's home document a decades-long friendship that connected Muscatine, Iowa, to one of the world's most influential political figures. Collected over years of visits, exchanges, and reunions, these mementos reflect the enduring relationships formed between local residents and their Chinese counterparts. Together, they illustrate how personal connections can shape international understanding and become part of a larger story of diplomacy and cultural exchange.",
        mediaType: "image",
        mediaSrc: "images/still1.jpg"
      },
      {
        id: "livingroom",
        label: "sarahlande",
        pitch: -17.58,
        yaw: 95.81,
        iconSrc: "images/hotspot-default.svg",
        iconAlt: "",
        iconSize: 32,
        fallbackIcon: "+",
        title: "Sitting with Xi Jinping",
        text: "Upon returning to Muscatine in 2012, Xi Jinping sat on this couch while visiting with Sarah Lande and other longtime Iowa friends in her living room. What was once an ordinary piece of furniture became the setting for a reunion that drew international attention and linked a small Iowa community to a future Chinese president. Photo by Xu Jingxing, China Daily, 2012.",
        mediaType: "image",
        mediaSrc: "images/photo1.jpeg"
      },
      {
        id: "gift",
        label: "gift",
        pitch: -3.85,
        yaw: 98.81,
        iconSrc: "images/hotspot-default.svg",
        iconAlt: "",
        iconSize: 32,
        fallbackIcon: "+",
        title: "Symbol of Cultural Exchange",
        text: "This commemorative plate was presented to Sarah Lande during a Dragon Boat Festival celebration. Created specifically for the event, it serves as a reminder of the gatherings, exchanges, and friendships that connected Muscatine residents with visitors from China. Displayed alongside other mementos in Lande's home, the plate reflects the lasting impact of those personal connections.",
        mediaType: "image",
        mediaSrc: "images/still3.jpg"
      },
          {
        id: "key",
        label: "key",
        pitch: -2.70,
        yaw: -73.02,
        iconSrc: "images/hotspot-default.svg",
        iconAlt: "",
        iconSize: 32,
        fallbackIcon: "+",
        title: "Key to the City",
        text: "This ceremonial key was presented to Sarah Lande by Muscatine Mayor Dwayne Hopkins in recognition of her service to the community. As a symbol of civic honor, it reflects the lasting influence of her work and the respect she earned among fellow Muscatine residents.",
        mediaType: "image",
        mediaSrc: "images/still2.jpg"
      },
    ];

    /*
      END STUDENT EDITING SECTION
      ------------------------------------------------------------
    */

    const overlay = document.getElementById("annotationOverlay");
    const closeButton = document.getElementById("annotationClose");
    const titleEl = document.getElementById("annotationTitle");
    const textEl = document.getElementById("annotationText");
    const mediaEl = document.getElementById("annotationMedia");
    const linkEl = document.getElementById("annotationLink");

    function createHotspotElement(hotSpotDiv, args) {
      hotSpotDiv.classList.add("custom-hotspot");
      hotSpotDiv.setAttribute("data-label", args.label || "Annotation");
      hotSpotDiv.setAttribute("tabindex", "0");
      hotSpotDiv.setAttribute("role", "button");
      hotSpotDiv.setAttribute("aria-label", args.label || "Open annotation");

      if (args.iconSize) {
        hotSpotDiv.style.setProperty("--hotspot-size", `${args.iconSize}px`);
      }

      if (args.iconSrc) {
        const iconImg = document.createElement("img");
        iconImg.src = args.iconSrc;
        iconImg.alt = args.iconAlt || "";
        iconImg.onerror = () => {
          hotSpotDiv.textContent = args.fallbackIcon || "+";
        };
        hotSpotDiv.appendChild(iconImg);
      } else {
        hotSpotDiv.textContent = args.fallbackIcon || "+";
      }

      hotSpotDiv.addEventListener("click", () => openAnnotation(args));
      hotSpotDiv.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openAnnotation(args);
        }
      });
    }

    function createSlideshow(slides) {
      let currentSlide = 0;

      const slideshow = document.createElement("div");
      slideshow.className = "slideshow";

      const image = document.createElement("img");
      image.className = "slideshow-image";

      const caption = document.createElement("div");
      caption.className = "slideshow-caption";

      const slideTitle = document.createElement("h3");
      const slideText = document.createElement("p");

      const controls = document.createElement("div");
      controls.className = "slideshow-controls";

      const prevButton = document.createElement("button");
      prevButton.type = "button";
      prevButton.className = "slideshow-button";
      prevButton.textContent = "Previous";

      const counter = document.createElement("span");
      counter.className = "slideshow-counter";

      const nextButton = document.createElement("button");
      nextButton.type = "button";
      nextButton.className = "slideshow-button";
      nextButton.textContent = "Next";

      function showSlide(index) {
        const slide = slides[index];

        image.src = slide.imageSrc;
        image.alt = slide.imageAlt || "";
        slideTitle.textContent = slide.title || "";
        slideText.textContent = slide.text || "";
        counter.textContent = `${index + 1} of ${slides.length}`;

        slideTitle.style.display = slide.title ? "block" : "none";
        slideText.style.display = slide.text ? "block" : "none";

        prevButton.disabled = slides.length <= 1;
        nextButton.disabled = slides.length <= 1;
      }

      prevButton.addEventListener("click", () => {
        currentSlide = (currentSlide - 1 + slides.length) % slides.length;
        showSlide(currentSlide);
      });

      nextButton.addEventListener("click", () => {
        currentSlide = (currentSlide + 1) % slides.length;
        showSlide(currentSlide);
      });

      caption.appendChild(slideTitle);
      caption.appendChild(slideText);

      controls.appendChild(prevButton);
      controls.appendChild(counter);
      controls.appendChild(nextButton);

      slideshow.appendChild(image);
      slideshow.appendChild(caption);
      slideshow.appendChild(controls);

      showSlide(currentSlide);

      return slideshow;
    }

    function openAnnotation(data) {
      titleEl.textContent = data.title || data.label || "Annotation";
      textEl.textContent = data.text || "";
      mediaEl.innerHTML = "";

      // Stop any previous media when a new annotation opens.
      mediaEl.replaceChildren();

      if (data.mediaType === "image" && data.mediaSrc) {
        const img = document.createElement("img");
        img.src = data.mediaSrc;
        img.alt = data.mediaAlt || "";
        mediaEl.appendChild(img);
      }

      if (data.mediaType === "video" && data.mediaSrc) {
        const video = document.createElement("video");
        video.src = data.mediaSrc;
        video.controls = true;
        video.playsInline = true;
        mediaEl.appendChild(video);
      }

      if (data.mediaType === "audio" && data.mediaSrc) {
        const audio = document.createElement("audio");
        audio.src = data.mediaSrc;
        audio.controls = true;
        mediaEl.appendChild(audio);
      }

      if (data.mediaType === "embed" && data.mediaSrc) {
        const iframe = document.createElement("iframe");
        iframe.src = data.mediaSrc;
        iframe.allow =
          "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
        iframe.allowFullscreen = true;
        iframe.title = data.title || "Embedded media";
        mediaEl.appendChild(iframe);
      }

      /*
        Slideshow annotations use a slides array instead of mediaSrc.
        That is why this check is separate from the image/video/audio/embed checks.
      */
      if (data.mediaType === "slideshow" && Array.isArray(data.slides) && data.slides.length > 0) {
        mediaEl.appendChild(createSlideshow(data.slides));
      }

      if (data.linkUrl && data.linkText) {
        linkEl.href = data.linkUrl;
        linkEl.textContent = data.linkText;
        linkEl.style.display = "inline-block";
      } else {
        linkEl.href = "#";
        linkEl.textContent = "";
        linkEl.style.display = "none";
      }

      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden", "false");
      closeButton.focus();
    }

    function closeAnnotation() {
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden", "true");

      // Stop audio/video/embed playback when closing.
      mediaEl.innerHTML = "";
    }

    closeButton.addEventListener("click", closeAnnotation);

    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) {
        closeAnnotation();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && overlay.classList.contains("is-open")) {
        closeAnnotation();
      }
    });

    const pannellumHotspots = HOTSPOTS.map((hotspot) => ({
      pitch: hotspot.pitch,
      yaw: hotspot.yaw,
      cssClass: "custom-hotspot",
      createTooltipFunc: createHotspotElement,
      createTooltipArgs: hotspot
    }));

    const viewer = pannellum.viewer("panorama", {
      type: "equirectangular",
      panorama: PANORAMA_IMAGE,
      autoLoad: true,
      showControls: false,
      compass: false,
      fullscreenCtrl: false,
      minHfov: 90,
      maxHfov: 90,
      yaw: START_VIEW.yaw,
      pitch: START_VIEW.pitch,
      hfov: START_VIEW.hfov,

      hotSpots: pannellumHotspots
    });

    /*
      Helper for finding hotspot coordinates.
      Open the browser console.
      Click anywhere in the panorama.
      Copy the pitch/yaw values into a hotspot object.
    */
    document.getElementById("panorama").addEventListener("click", () => {
      const pitch = viewer.getPitch().toFixed(2);
      const yaw = viewer.getYaw().toFixed(2);
      console.log(`Hotspot position: pitch: ${pitch}, yaw: ${yaw}`);
    });
  </script>
</body>
</html>
